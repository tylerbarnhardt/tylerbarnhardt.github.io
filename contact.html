<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Contact — Coast to Coast Movie Club</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root{--black:#0c0c0c;--white:#f5f2ee;--gold:#f5c518;--gray:#1a1a1a;--mid:#2a2a2a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:overlay;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:22px 48px;background:rgba(12,12,12,0.88);backdrop-filter:blur(10px);border-bottom:1px solid rgba(245,197,24,0.08);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.14em;color:var(--white);text-decoration:none;}
.nav-links a{font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--white);text-decoration:none;margin-left:36px;opacity:0.65;transition:opacity 0.2s,color 0.2s;}
.nav-links a:hover,.nav-links a.active{opacity:1;color:var(--gold);}
footer{background:var(--black);border-top:1px solid #1e1e1e;padding:48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.f-logo{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.15em;color:var(--white);opacity:0.4;}
.f-copy{font-size:0.7rem;letter-spacing:0.1em;color:rgba(245,242,238,0.25);text-transform:uppercase;}
@media(max-width:768px){nav{padding:18px 24px;}footer{padding:36px 24px;}}
</style>
<style>
.page-hero{
  position:relative;height:52vh;min-height:340px;overflow:hidden;display:flex;align-items:flex-end;
}
.page-hero img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 0%;
  filter:grayscale(25%) contrast(1.1) brightness(0.45);
}
.page-hero-text{
  position:relative;z-index:2;padding:52px 48px;width:100%;
  background:linear-gradient(to top,rgba(12,12,12,1) 0%,rgba(12,12,12,0.5) 55%,transparent 100%);
}
.page-hero-text h1{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,6rem);
  line-height:0.9;letter-spacing:0.03em;color:var(--white);
}
.page-hero-text h1 em{font-style:normal;color:var(--gold);}
.contact-wrap{
  display:grid;grid-template-columns:1fr 1fr;gap:2px;
  min-height:60vh;
}
.contact-form-side{
  background:var(--gray);padding:80px 60px;
}
.contact-form-side h2{
  font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:0.04em;
  color:var(--white);margin-bottom:8px;
}
.contact-form-side h2 em{font-style:normal;color:var(--gold);}
.contact-form-side p{
  font-size:0.92rem;color:rgba(245,242,238,0.45);margin-bottom:44px;line-height:1.65;
}
.form-group{margin-bottom:24px;}
.form-group label{
  display:block;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(245,197,24,0.7);margin-bottom:8px;
}
.form-group input,.form-group textarea{
  width:100%;background:#111;border:1px solid #2a2a2a;color:var(--white);
  padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:0.95rem;
  font-weight:300;outline:none;transition:border-color 0.2s;
  resize:none;
}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group textarea{height:140px;}
.submit-btn{
  display:inline-block;padding:16px 40px;background:var(--gold);
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--black);border:none;cursor:pointer;
  transition:background 0.2s;width:100%;text-align:center;
}
.submit-btn:hover{background:#e6b800;}
.contact-info-side{
  background:var(--black);padding:80px 60px;
  display:flex;flex-direction:column;justify-content:space-between;
  border-left:1px solid #1a1a1a;
}
.info-block{margin-bottom:52px;}
.info-label{
  font-family:'Bebas Neue',sans-serif;font-size:0.78rem;letter-spacing:0.3em;
  color:var(--gold);text-transform:uppercase;
  border-top:1px solid rgba(245,197,24,0.25);padding-top:14px;
  display:block;margin-bottom:14px;
}
.info-block p,.info-block a{
  font-size:1rem;color:rgba(245,242,238,0.65);
  text-decoration:none;line-height:1.7;display:block;
  transition:color 0.2s;
}
.info-block a:hover{color:var(--gold);}
.social-links{display:flex;flex-direction:column;gap:12px;}
.social-link{
  display:inline-flex;align-items:center;gap:12px;
  font-size:0.82rem;letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(245,242,238,0.5);text-decoration:none;
  transition:color 0.2s;padding:12px 0;border-bottom:1px solid #1a1a1a;
}
.social-link:hover{color:var(--gold);}
.social-link svg{flex-shrink:0;}
.success-msg{
  display:none;padding:16px 20px;background:rgba(245,197,24,0.1);
  border:1px solid rgba(245,197,24,0.3);
  font-size:0.88rem;color:var(--gold);margin-top:16px;letter-spacing:0.05em;
}
@media(max-width:768px){
  .contact-wrap{grid-template-columns:1fr;}
  .contact-form-side,.contact-info-side{padding:60px 24px;}
  .page-hero-text{padding:40px 24px;}
}
</style>
</head>

  <div class="nav-links">
    <a href="index.html" >Home</a>
    <a href="about.html" >About</a>
    <a href="contact.html" class="active">Contact</a>
  </div>
</nav>

    <h2>DROP US A <em>LINE.</em></h2>
    <p>Questions, feedback, movie recommendations, or just want to say hi — we read everything.</p>
    <form action="https://formspree.io/f/mvzbekdv" method="POST" onsubmit="handleSubmit(event)">

    </form>
    <script>
      function handleSubmit(e) {
        e.preventDefault();
        const form = e.target;
        fetch(form.action, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(form)
        })
        .then(res => {
          if (res.ok) {
            document.getElementById('success-msg').style.display = 'block';
            form.reset();
          } else {
            alert('Something went wrong. Please try again.');
          }
        })
        .catch(() => alert('Something went wrong. Please try again.'));
      }
    </script>
