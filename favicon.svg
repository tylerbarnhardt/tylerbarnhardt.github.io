<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Left half: deep ocean blue -->
  <clipPath id="left-clip">
    <rect x="0" y="0" width="32" height="64"/>
  </clipPath>
  <!-- Right half: warm orange -->
  <clipPath id="right-clip">
    <rect x="32" y="0" width="32" height="64"/>
  </clipPath>

  <!-- Background: left blue, right orange -->
  <rect x="0" y="0" width="32" height="64" fill="#1a3a5c"/>
  <rect x="32" y="0" width="32" height="64" fill="#e8621a"/>

  <!-- Subtle film strip perforations top -->
  <rect x="2" y="2" width="6" height="6" rx="1" fill="white" opacity="0.15"/>
  <rect x="28" y="2" width="6" height="6" rx="1" fill="white" opacity="0.15"/>
  <rect x="56" y="2" width="6" height="6" rx="1" fill="white" opacity="0.15"/>

  <!-- Subtle film strip perforations bottom -->
  <rect x="2" y="56" width="6" height="6" rx="1" fill="white" opacity="0.15"/>
  <rect x="28" y="56" width="6" height="6" rx="1" fill="white" opacity="0.15"/>
  <rect x="56" y="56" width="6" height="6" rx="1" fill="white" opacity="0.15"/>


</svg>
